<!doctype html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Font Optimization -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- SEO -->
    <title>Mohamed Nihaal | Storytelling Portfolio | Full Stack Developer & UI/UX Designer</title>

    <meta
      name="description"
      content="Explore the storytelling portfolio of Mohamed Nihaal, a Full Stack Developer, React Developer, Flutter Developer and UI/UX Designer from Chennai."
    />

    <meta
      name="keywords"
      content="Mohamed Nihaal, S Md Nihaal, Portfolio, Full Stack Developer, React Developer, Flutter Developer, UI UX Designer, Chennai"
    />

    <meta name="author" content="Mohamed Nihaal" />
    <meta name="robots" content="index,follow" />
    <meta name="theme-color" content="#0b0b0b" />

    <!-- Canonical -->
    <link
      rel="canonical"
      href="https://storytelling-portfolio-pi.vercel.app/"
    />

    <!-- Favicons -->
    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/favicon.png" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Mohamed Nihaal | Full Stack Developer" />
    <meta
      property="og:description"
      content="Official portfolio of Mohamed Nihaal."
    />
    <meta
      property="og:image"
      content="https://storytelling-portfolio-pi.vercel.app/og-image.png"
    />
    <meta
      property="og:url"
      content="https://storytelling-portfolio-pi.vercel.app/"
    />
    <meta property="og:site_name" content="Mohamed Nihaal Portfolio" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:image"
      content="https://storytelling-portfolio-pi.vercel.app/og-image.png"
    />

    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Mohamed Nihaal",
        "alternateName": "S. Md. Nihaal",
        "url": "https://storytelling-portfolio-pi.vercel.app/",
        "image": "https://storytelling-portfolio-pi.vercel.app/profile.jpg",
        "jobTitle": "Full Stack Developer",
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Chennai",
          "addressCountry": "India"
        },
        "sameAs": [
          "https://github.com/urfavnihaal",
          "https://www.linkedin.com/in/nihaal2007/"
        ]
      }
    </script>
  </head>

  <body>
    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
